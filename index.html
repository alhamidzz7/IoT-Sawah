<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Sawah IoT</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #f0f4f1;
      --primary-green: #27ae60;
      --dark-green: #1e8449;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --warning-bg: #f39c12;
      --critical-bg: #c0392b;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      margin: 0; 
      padding: 20px 15px;
      display: flex; 
      flex-direction: column; 
      align-items: center;
      color: var(--text-main);
    }

    .header { 
      text-align: center; 
      margin-bottom: 25px; 
      width: 100%;
      max-width: 450px;
    }
    
    .header h1 { 
      color: var(--dark-green); 
      margin: 0; 
      font-size: 26px; 
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    
    .header p { 
      color: var(--text-muted); 
      margin: 8px 0 0 0; 
      font-size: 14px; 
      font-weight: 500;
    }
    
    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px; 
      width: 100%; 
      max-width: 450px;
    }

    .card {
      background: var(--card-bg); 
      padding: 20px 15px; 
      border-radius: 16px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.04);
      text-align: center;
      transition: transform 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: var(--primary-green);
      opacity: 0.8;
    }

    .card-icon {
      font-size: 24px;
      color: var(--primary-green);
      margin-bottom: 10px;
    }

    .card-title { 
      font-size: 12px; 
      color: var(--text-muted); 
      font-weight: 700; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .card-value { 
      font-size: 26px; 
      color: var(--text-main); 
      font-weight: 800; 
      margin-top: 8px; 
    }

    .card-unit {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .rekomendasi-card {
      background: linear-gradient(135deg, var(--primary-green), var(--dark-green)); 
      color: white; 
      margin-top: 25px;
      width: 100%; 
      max-width: 450px; 
      padding: 25px 20px;
      border-radius: 20px; 
      text-align: center;
      box-sizing: border-box;
      box-shadow: 0 10px 20px rgba(39, 174, 96, 0.2);
    }

    .rekomendasi-title { 
      font-size: 13px; 
      font-weight: 700; 
      opacity: 0.9; 
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .rekomendasi-text { 
      font-size: 18px; 
      font-weight: 600; 
      line-height: 1.5;
    }

    /* Animasi kecil saat data update */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    .update-anim {
      animation: pulse 0.3s ease-in-out;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Smart Sawah IoT</h1>
    <p>Sistem Rekomendasi Optimasi Tanah </p>
  </div> 

  <div class="grid-container">
    <div class="card" id="card-kelembapan">
      <div class="card-icon"><i class="fa-solid fa-droplet"></i></div>
      <div class="card-title">Kelembapan</div>
      <div class="card-value"><span id="val-kelembapan">--</span><span class="card-unit">%</span></div>
    </div>
    
    <div class="card" id="card-ph">
      <div class="card-icon"><i class="fa-solid fa-flask"></i></div>
      <div class="card-title">pH Tanah</div>
      <div class="card-value"><span id="val-ph">--</span></div>
    </div>
    
    <div class="card" id="card-n">
      <div class="card-icon"><i class="fa-solid fa-seedling"></i></div>
      <div class="card-title">Nitrogen (N)</div>
      <div class="card-value"><span id="val-n">--</span></div>
    </div>
    
    <div class="card" id="card-p">
      <div class="card-icon"><i class="fa-solid fa-leaf"></i></div>
      <div class="card-title">Fosfor (P)</div>
      <div class="card-value"><span id="val-p">--</span></div>
    </div>
    
    <div class="card" id="card-k" style="grid-column: span 2;">
      <div class="card-icon"><i class="fa-solid fa-tree"></i></div>
      <div class="card-title">Kalium (K)</div>
      <div class="card-value"><span id="val-k">--</span></div>
    </div>
  </div>

  <div class="rekomendasi-card" id="card-rekomendasi">
    <div class="rekomendasi-title">
      <i class="fa-solid fa-robot"></i> REKOMENDASI 
    </div>
    <div class="rekomendasi-text" id="val-rekomendasi">Menunggu sinkronisasi data dari sensor...</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log("Service Worker Failed", err));
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2wtVXwHfeDO0QZH5jTN1FofH9496uzSs",
      authDomain: "sawah-esp32.firebaseapp.com",
      databaseURL: "https://sawah-esp32-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sawah-esp32",
      storageBucket: "sawah-esp32.firebasestorage.app",
      messagingSenderId: "510872596701",
      appId: "1:510872596701:web:bd7ffa7b87e6983a2fab34"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const sawahRef = ref(db, 'kondisi_sawah');

    // Fungsi untuk nambahin animasi setiap data berubah
    function animateCard(id) {
      const card = document.getElementById(id);
      card.classList.remove('update-anim');
      void card.offsetWidth; // trigger reflow
      card.classList.add('update-anim');
    }

    onValue(sawahRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('val-kelembapan').innerText = data.kelembapan;
        document.getElementById('val-ph').innerText = data.ph;
        document.getElementById('val-n').innerText = data.nitrogen;
        document.getElementById('val-p').innerText = data.fosfor;
        document.getElementById('val-k').innerText = data.kalium;
        
        if(data.rekomendasi) {
          document.getElementById('val-rekomendasi').innerText = data.rekomendasi;
          
          // Ubah warna background rekomendasi kalau statusnya kritis (mengandung kata "Kritis" atau "Tindakan")
          const rekCard = document.getElementById('card-rekomendasi');
          if(data.rekomendasi.includes("Kritis") || data.rekomendasi.includes("Tindakan")) {
            rekCard.style.background = "linear-gradient(135deg, #e74c3c, #c0392b)";
          } else if(data.rekomendasi.includes("Waspada") || data.rekomendasi.includes("Perbaikan") || data.rekomendasi.includes("Perhatian")) {
            rekCard.style.background = "linear-gradient(135deg, #f39c12, #d35400)";
          } else {
            rekCard.style.background = "linear-gradient(135deg, #27ae60, #1e8449)";
          }
        }

        // Jalankan animasi pulse
        animateCard('card-kelembapan');
        animateCard('card-ph');
        animateCard('card-n');
        animateCard('card-p');
        animateCard('card-k');
      }
    });
  </script>
</body>
</html>
