<!DOCTYPE html>
<html lang="id">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Farming</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #f0f4f1;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --warna-biru-optimal: #3498db;
      --warna-kuning-rendah: #f1c40f;
      --warna-merah-tinggi: #e74c3c;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; }
    .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 450px; }
    .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid #ccc; transition: all 0.3s ease; }
    .card-value { font-size: 24px; font-weight: 800; margin-top: 5px; }
    .card-status { font-size: 13px; font-weight: 700; margin-top: 5px; padding: 3px 8px; border-radius: 12px; display: inline-block;}
    .status-optimal { border-top-color: var(--warna-biru-optimal); }
    .status-optimal .card-status { background: #e0f7fa; color: var(--warna-biru-optimal); }
    .status-rendah { border-top-color: var(--warna-kuning-rendah); }
    .status-rendah .card-status { background: #fef9e7; color: #d4ac0d; }
    .status-tinggi { border-top-color: var(--warna-merah-tinggi); }
    .status-tinggi .card-status { background: #fdedec; color: var(--warna-merah-tinggi); }
    .rekomendasi-card { background: #7f8c8d; color: white; margin-top: 20px; width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; text-align: center; }
  </style>
</head>
<body>

  <div id="dashboard">
    <div class="grid-container">
      <div class="card" id="card-kelembapan">
        <div class="card-title">Kelembapan</div>
        <div class="card-value"><span id="val-kelembapan">--</span>%</div>
        <div class="card-status" id="stat-kelembapan">Memuat...</div>
      </div>
      <div class="card" id="card-ph">
        <div class="card-title">pH Tanah</div>
        <div class="card-value"><span id="val-ph">--</span></div>
        <div class="card-status" id="stat-ph">Memuat...</div>
      </div>
      <div class="card" id="card-n"><div class="card-title">Nitrogen</div><div class="card-value"><span id="val-n">--</span></div><div class="card-status" id="stat-n">--</div></div>
      <div class="card" id="card-p"><div class="card-title">Fosfor</div><div class="card-value"><span id="val-p">--</span></div><div class="card-status" id="stat-p">--</div></div>
      <div class="card" id="card-k" style="grid-column: span 2;"><div class="card-title">Kalium</div><div class="card-value"><span id="val-k">--</span></div><div class="card-status" id="stat-k">--</div></div>
    </div>
    <div class="rekomendasi-card" id="card-rekomendasi"><div id="val-rekomendasi">Menunggu data...</div></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    
    const app = initializeApp({ databaseURL: "https://sawah-esp32-default-rtdb.asia-southeast1.firebasedatabase.app" });
    const db = getDatabase(app);

    window.updateCard = function(cardId, statId, val, tipe) {
      const card = document.getElementById(cardId);
      const stat = document.getElementById(statId);
      card.className = "card"; 
      
      if (tipe === "kelembapan") {
        if (val < 65) { card.classList.add("status-tinggi"); stat.innerText = "Kering"; }
        else if (val < 80) { card.classList.add("status-rendah"); stat.innerText = "Lembab"; }
        else { card.classList.add("status-optimal"); stat.innerText = "Optimal"; }
      }
      else if (tipe === "ph") {
        if (val < 5.75) { card.classList.add("status-rendah"); stat.innerText = "Asam"; }
        else if (val <= 7.25) { card.classList.add("status-optimal"); stat.innerText = "Optimal"; }
        else { card.classList.add("status-tinggi"); stat.innerText = "Basa"; }
      }
      else if (tipe === "npk") {
        if (val < 125) { card.classList.add("status-rendah"); stat.innerText = "Hara Rendah"; }
        else if (val <= 175) { card.classList.add("status-optimal"); stat.innerText = "Hara Optimal"; }
        else { card.classList.add("status-tinggi"); stat.innerText = "Hara Tinggi"; }
      }
    }

    onValue(ref(db, 'kondisi_sawah'), (snapshot) => {
      const d = snapshot.val();
      if (!d) return;
      document.getElementById('val-kelembapan').innerText = d.kelembapan;
      document.getElementById('val-ph').innerText = d.ph;
      document.getElementById('val-n').innerText = d.nitrogen;
      document.getElementById('val-p').innerText = d.fosfor;
      document.getElementById('val-k').innerText = d.kalium;
      document.getElementById('val-rekomendasi').innerText = d.rekomendasi;

      updateCard("card-kelembapan", "stat-kelembapan", d.kelembapan, "kelembapan");
      updateCard("card-ph", "stat-ph", d.ph, "ph");
      updateCard("card-n", "stat-n", d.nitrogen, "npk");
      updateCard("card-p", "stat-p", d.fosfor, "npk");
      updateCard("card-k", "stat-k", d.kalium, "npk");
    });
  </script>
</body>
</html>
