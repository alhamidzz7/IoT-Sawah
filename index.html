<!DOCTYPE html>
<html lang="id">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Farming</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #f0f4f1;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --warna-biru-optimal: #3498db;
      --warna-kuning-rendah: #f1c40f;
      --warna-merah-tinggi: #e74c3c;
    }
    .export-container { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; max-width: 450px; margin: 20px auto 10px auto; }
    .btn-export { flex: 1; padding: 12px 20px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .btn-export:active { transform: scale(0.95); }
    .btn-excel { background: #27ae60; } 
    .btn-pdf { background: #c0392b; } 
    .btn-reset { width: 100%; max-width: 450px; padding: 12px; border: none; border-radius: 12px; background: #7f8c8d; color: white; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto 30px auto; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); }
    #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #27ae60, #1e8449); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    .login-box { background: white; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .login-box button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    #login-error { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
    #dashboard { display: none; padding: 20px 15px; flex-direction: column; align-items: center; }
    .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 450px; position: relative;}
    .header h1 { color: #1e8449; margin: 0; font-size: 24px; font-weight: 800; }
    .logout-btn { position: absolute; top: 0; right: 0; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 450px; }
    .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid #ccc; transition: all 0.3s ease; }
    .card-icon { font-size: 20px; margin-bottom: 5px; color: #7f8c8d; }
    .card-title { font-size: 12px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }
    .card-value { font-size: 24px; font-weight: 800; margin-top: 5px; }
    .card-status { font-size: 13px; font-weight: 700; margin-top: 5px; padding: 3px 8px; border-radius: 12px; display: inline-block;}
    .status-optimal { border-top-color: var(--warna-biru-optimal); }
    .status-optimal .card-icon { color: var(--warna-biru-optimal); }
    .status-optimal .card-status { background: #e0f7fa; color: var(--warna-biru-optimal); }
    .status-rendah { border-top-color: var(--warna-kuning-rendah); }
    .status-rendah .card-icon { color: var(--warna-kuning-rendah); }
    .status-rendah .card-status { background: #fef9e7; color: #d4ac0d; }
    .status-tinggi { border-top-color: var(--warna-merah-tinggi); }
    .status-tinggi .card-icon { color: var(--warna-merah-tinggi); }
    .status-tinggi .card-status { background: #fdedec; color: var(--warna-merah-tinggi); }
    .rekomendasi-card { background: #7f8c8d; color: white; margin-top: 20px; width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; text-align: center; box-sizing: border-box; transition: background 0.5s ease; box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h2>Smart Farming</h2>
      <input type="email" id="email" placeholder="Email Petani">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Masuk</button>
      <div id="login-error">Email atau password salah!</div>
    </div>
  </div>

  <div id="dashboard">
    <div class="header"><h1>Smart Farming</h1><button class="logout-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i></button></div>
    <div class="grid-container">
      <div class="card" id="card-kelembapan"><div class="card-icon"><i class="fa-solid fa-droplet"></i></div><div class="card-title">Kelembapan</div><div class="card-value"><span id="val-kelembapan">--</span>%</div><div class="card-status" id="stat-kelembapan">Memuat...</div></div>
      <div class="card" id="card-ph"><div class="card-icon"><i class="fa-solid fa-flask"></i></div><div class="card-title">pH Tanah</div><div class="card-value"><span id="val-ph">--</span></div><div class="card-status" id="stat-ph">Memuat...</div></div>
      <div class="card" id="card-n"><div class="card-icon"><i class="fa-solid fa-seedling"></i></div><div class="card-title">Nitrogen (N)</div><div class="card-value"><span id="val-n">--</span></div><div class="card-status" id="stat-n">Memuat...</div></div>
      <div class="card" id="card-p"><div class="card-icon"><i class="fa-solid fa-leaf"></i></div><div class="card-title">Fosfor (P)</div><div class="card-value"><span id="val-p">--</span></div><div class="card-status" id="stat-p">Memuat...</div></div>
      <div class="card" id="card-k" style="grid-column: span 2;"><div class="card-icon"><i class="fa-solid fa-tree"></i></div><div class="card-title">Kalium (K)</div><div class="card-value"><span id="val-k">--</span></div><div class="card-status" id="stat-k">Memuat...</div></div>
    </div>
    <div class="rekomendasi-card" id="card-rekomendasi"><div style="font-size:12px; font-weight:bold; margin-bottom:10px;"><i class="fa-solid fa-robot"></i> REKOMENDASI OPTIMASI</div><div id="val-rekomendasi" style="font-size:16px; font-weight:bold;">Menunggu sinkronisasi...</div></div>
    <div class="export-container">
      <button class="btn-export btn-excel" onclick="exportExcel()"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
      <button class="btn-export btn-pdf" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
    </div>
    <button class="btn-reset" onclick="hapusRiwayat()"><i class="fa-solid fa-trash-can"></i> Reset & Hapus Semua Riwayat</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    const auth = getAuth(initializeApp({ databaseURL: "https://sawah-esp32-default-rtdb.asia-southeast1.firebasedatabase.app" }));
    const db = getDatabase();

    window.updateCard = (id, statId, val, tipe) => {
        const card = document.getElementById(id);
        const stat = document.getElementById(statId);
        card.className = "card";
        if (tipe === "ph") {
            if (val < 6.0) { card.classList.add("status-rendah"); stat.innerText = "Asam"; }
            else if (val <= 7.0) { card.classList.add("status-optimal"); stat.innerText = "Optimal"; }
            else { card.classList.add("status-tinggi"); stat.innerText = "Basa"; }
        } else if (tipe === "kelembapan") {
            if (val < 65) { card.classList.add("status-tinggi"); stat.innerText = "Kering"; }
            else if (val < 80) { card.classList.add("status-rendah"); stat.innerText = "Lembab"; }
            else { card.classList.add("status-optimal"); stat.innerText = "Optimal"; }
        } else {
            if (val < 125) { card.classList.add("status-rendah"); stat.innerText = "Hara Rendah"; }
            else if (val <= 175) { card.classList.add("status-optimal"); stat.innerText = "Hara Optimal"; }
            else { card.classList.add("status-tinggi"); stat.innerText = "Hara Tinggi"; }
        }
    };

    onValue(ref(db, 'kondisi_sawah'), (snap) => {
      const d = snap.val();
      if (!d) return;
      document.getElementById('val-kelembapan').innerText = d.kelembapan;
      document.getElementById('val-ph').innerText = d.ph;
      document.getElementById('val-n').innerText = d.nitrogen;
      document.getElementById('val-p').innerText = d.fosfor;
      document.getElementById('val-k').innerText = d.kalium;
      document.getElementById('val-rekomendasi').innerText = d.rekomendasi;
      updateCard("card-kelembapan", "stat-kelembapan", d.kelembapan, "kelembapan");
      updateCard("card-ph", "stat-ph", d.ph, "ph");
      updateCard("card-n", "stat-n", d.nitrogen, "npk");
      updateCard("card-p", "stat-p", d.fosfor, "npk");
      updateCard("card-k", "stat-k", d.kalium, "npk");
    });

    onAuthStateChanged(auth, (user) => {
      document.getElementById('login-screen').style.display = user ? "none" : "flex";
      document.getElementById('dashboard').style.display = user ? "flex" : "none";
    });
    
    window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(() => document.getElementById('login-error').style.display = "block");
    window.logout = () => signOut(auth);
    window.exportExcel = async () => { const snap = await get(ref(db, 'riwayat_sawah')); if(snap.exists()) XLSX.writeFile(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(Object.values(snap.val())), "Riwayat.xlsx"); };
    window.exportPDF = async () => { const snap = await get(ref(db, 'riwayat_sawah')); if(snap.exists()) { const doc = new window.jspdf.jsPDF(); doc.autoTable({ head: [['Waktu', 'Lembap', 'pH', 'N', 'P', 'K']], body: Object.values(snap.val()).map(v => [v.waktu || "-", v.kelembapan, v.ph, v.nitrogen, v.fosfor, v.kalium]) }); doc.save("Riwayat.pdf"); } };
    window.hapusRiwayat = () => { if(confirm("Hapus semua data?")) remove(ref(db, 'riwayat_sawah')); };
  </script>
</body>
</html>
