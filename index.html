<!DOCTYPE html>
<html lang="id">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <meta charset="UTF-8">
  <title>Smart Farming</title>
  <style>
    body { font-family: sans-serif; background: #f0f4f1; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 450px; }
    .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; text-align: center; border-top: 5px solid #ccc; }
    .btn-action { width: 100%; padding: 15px; border: none; border-radius: 8px; margin-top: 10px; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <div id="login-layer" style="width:100%; max-width:450px;">
    <h2>Login Petani</h2>
    <input type="password" id="pass-input" placeholder="Masukkan Password" style="width:100%; padding:10px;">
    <button class="btn-action" style="background:#27ae60" onclick="cekLogin()">Masuk</button>
  </div>

  <div id="dashboard-layer" style="display:none; width:100%; max-width:450px;">
    <h1>Smart Farming</h1>
    <div id="grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <div class="card" id="card-ph">pH: <span id="val-ph">--</span><div id="stat-ph">--</div></div>
      <div class="card" id="card-lembap">Lembap: <span id="val-kelembapan">--</span>%<div id="stat-kelembapan">--</div></div>
    </div>
    <button class="btn-action" style="background:#c0392b" onclick="logout()">Logout</button>
    <button class="btn-action" style="background:#27ae60" onclick="exportPDF()">Export PDF</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    
    const db = getDatabase(initializeApp({ databaseURL: "https://sawah-esp32-default-rtdb.asia-southeast1.firebasedatabase.app" }));

    // --- FITUR LOGIN LOKAL ---
    window.cekLogin = () => {
      const pass = document.getElementById('pass-input').value;
      if (pass === "12345") { // Ganti password sesuai keinginan lo
        document.getElementById('login-layer').style.display = 'none';
        document.getElementById('dashboard-layer').style.display = 'block';
        localStorage.setItem('isLoggedIn', 'true');
      } else {
        alert("Password Salah!");
      }
    };

    window.logout = () => {
      localStorage.removeItem('isLoggedIn');
      location.reload();
    };

    // Auto-login kalau udah pernah masuk
    if (localStorage.getItem('isLoggedIn') === 'true') {
      document.getElementById('login-layer').style.display = 'none';
      document.getElementById('dashboard-layer').style.display = 'block';
    }

    // --- LOGIKA SENSOR (pH 6-7 = Optimal) ---
    onValue(ref(db, 'kondisi_sawah'), (snap) => {
      const d = snap.val();
      if (!d) return;
      document.getElementById('val-ph').innerText = d.ph;
      const stat = document.getElementById('stat-ph');
      
      // LOGIKA YANG LO MAU
      if (d.ph < 6.0) { stat.innerText = "Asam"; stat.style.color = "orange"; }
      else if (d.ph <= 7.0) { stat.innerText = "Optimal"; stat.style.color = "blue"; }
      else { stat.innerText = "Basa"; stat.style.color = "red"; }
    });
  </script>
</body>
</html>
